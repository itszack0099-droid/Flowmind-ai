publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  smooth_page_indicator: ^1.1.0
  animate_do: ^3.3.4
  go_router: ^13.0.0
  flutter_riverpod: ^2.4.9
  shared_preferences: ^2.2.2
  http: ^1.2.0
  supabase_flutter: ^2.3.0
  app_links: ^6.1.0
  file_picker: ^8.0.0
  syncfusion_flutter_pdf: ^25.1.35
  http_parser: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
