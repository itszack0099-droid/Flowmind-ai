name: flowmind
description: FlowMind AI - Your Personal AI Mentor
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.7 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core UI & Navigation
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  animate_do: ^3.3.4
  smooth_page_indicator: ^1.1.0
  go_router: ^13.0.0
  flutter_riverpod: ^2.4.9

  # Storage & Backend
  shared_preferences: ^2.2.2
  supabase_flutter: ^2.3.0
  app_links: ^3.5.1

  # File & Media
  file_picker: ^8.0.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  pdfx: ^2.8.0
  docx_to_text: ^1.0.0
  youtube_transcript_api: ^1.0.0   # ← YouTube ke liye zaroori

  # HTTP & Notifications
  http: ^1.2.2
  http_parser: ^4.0.2
  flutter_local_notifications: ^9.9.1

  # Local AI
  llamadart: ^0.6.10

  # Firebase (agar use kar rahe ho)
  firebase_core: ^2.30.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/