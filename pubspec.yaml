name: Flowmind
description: FlowMind AI - Your Personal AI Mentor
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  smooth_page_indicator: ^1.1.0
  animate_do: ^3.3.4
  go_router: ^13.0.0
  flutter_riverpod: ^2.4.9
  shared_preferences: ^2.2.2
  http: ^1.2.0
  supabase_flutter: ^2.3.0
  app_links: 3.5.1
  file_picker: ^8.0.0
  http_parser: ^4.0.2
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
