name: Build FlowMind APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: stable
          cache: true

      - name: Create Android scaffold if missing
        run: |
          if [ ! -d android ]; then
            flutter create .
          fi

      - name: Fix Gradle permission
        run: chmod +x android/gradlew

      # FORCE V2 EMBEDDING (REAL FIX)
      - name: Force Android V2 Embedding
        run: |
          mkdir -p android/app/src/main/kotlin/com/flowmind

          cat > android/app/src/main/kotlin/com/flowmind/MainActivity.kt <<'EOF'
          package com.flowmind

          import io.flutter.embedding.android.FlutterActivity

          class MainActivity: FlutterActivity() {
          }
          EOF

          echo "V2 MainActivity ensured."

      - name: Ensure Manifest metadata
        run: |
          python3 - <<'EOF'
          path = "android/app/src/main/AndroidManifest.xml"

          with open(path, "r") as f:
              content = f.read()

          if "flutterEmbedding" not in content:
              content = content.replace(
                  "<application",
                  '<meta-data android:name="flutterEmbedding" android:value="2"/>\n    <application'
              )

          if "INTERNET" not in content:
              content = content.replace(
                  "<application",
                  '<uses-permission android:name="android.permission.INTERNET"/>\n'
                  '<uses-permission android:name="android.permission.VIBRATE"/>\n'
                  '<application'
              )

          with open(path, "w") as f:
              f.write(content)

          print("Manifest fixed.")
          EOF

      - name: Ensure logo exists
        run: |
          mkdir -p assets/images

          if [ ! -f assets/images/logo.png ]; then
            sudo apt-get update
            sudo apt-get install -y imagemagick
            convert -size 512x512 xc:#4F46E5 \
              -gravity center \
              -pointsize 72 \
              -fill white \
              -annotate 0 "FlowMind" \
              assets/images/logo.png
          fi

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Generate App Icons
        run: |
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          convert assets/images/logo.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert assets/images/logo.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert assets/images/logo.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert assets/images/logo.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert assets/images/logo.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Clean and install dependencies
        run: |
          flutter clean
          rm -f pubspec.lock
          flutter pub get

      - name: Analyze Code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build Release APK
        run: |
          flutter build apk --release --no-tree-shake-icons \
            --dart-define=SUPABASE_URL=https://siujmsbmvwxxbdhlihgd.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpdWptc2Jtdnd4eGJkaGxpaGdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NDQ2MDksImV4cCI6MjA4OTEyMDYwOX0.WlRm9ySc6huXd7018ESMTtkKS4XLmgBszNO0yvoG2DY

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlowMind-APK-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Show APK Size
        run: |
          echo "Build Successful"
          ls -lh build/app/outputs/flutter-apk/*.apk
