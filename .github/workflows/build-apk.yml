name: Build FlowMind APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Manual trigger button in GitHub

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      # 4. Get dependencies
      - name: Install Dependencies
        run: flutter pub get

      # 5. Create dummy .env file
      - name: Create .env file
        run: |
          echo "GROQ_API_KEY=placeholder" > .env
          echo "SUPABASE_URL=placeholder" >> .env
          echo "SUPABASE_ANON_KEY=placeholder" >> .env

      # 6. Create assets directory
      - name: Create assets
        run: mkdir -p assets/images

      # 7. Analyze code
      - name: Analyze Code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # 8. Build APK (release)
      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      # 9. Also build split APKs (smaller size)
      - name: Build Split APKs
        run: flutter build apk --split-per-abi --release --no-tree-shake-icons

      # 10. Upload APK as artifact
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: FlowMind-APK-${{ github.run_number }}
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30

      # 11. Show APK size
      - name: Show APK Info
        run: |
          echo "✅ APK Build Successful!"
          echo "📦 APK Sizes:"
          ls -lh build/app/outputs/flutter-apk/*.apk
