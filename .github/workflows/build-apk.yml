name: Build FlowMind APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Create Flutter project scaffold
        run: |
          flutter create --org com.flowmind --project-name flowmind temp_project
          cp -r temp_project/android ./android
          cp -r temp_project/ios ./ios
          cp -r temp_project/web ./web
          cp temp_project/analysis_options.yaml ./analysis_options.yaml || true
          rm -rf temp_project

      - name: Fix Gradle permission
        run: chmod +x android/gradlew

      - name: Add Permissions and Deep Link
        run: |
          python3 - <<'EOF'
          with open('android/app/src/main/AndroidManifest.xml', 'r') as f:
              content = f.read()

          if 'INTERNET' not in content:
              content = content.replace(
                  '<application',
                  '<uses-permission android:name="android.permission.INTERNET"/>\n'
                  '<uses-permission android:name="android.permission.VIBRATE"/>\n'
                  '<uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>\n'
                  '<application'
              )

          if 'flowmind' not in content:
              content = content.replace(
                  '</activity>',
                  '''    <intent-filter>
                      <action android:name="android.intent.action.VIEW"/>
                      <category android:name="android.intent.category.DEFAULT"/>
                      <category android:name="android.intent.category.BROWSABLE"/>
                      <data android:scheme="flowmind"/>
                  </intent-filter>
              </activity>'''
              )

          with open('android/app/src/main/AndroidManifest.xml', 'w') as f:
              f.write(content)

          print("AndroidManifest.xml updated!")
          EOF

      - name: Enable Android V2 Embedding
        run: |
          python3 - <<'EOF'
          with open('android/app/src/main/AndroidManifest.xml', 'r') as f:
              content = f.read()

          if 'flutterEmbedding' not in content:
              content = content.replace(
                  '<application',
                  '<meta-data android:name="flutterEmbedding" android:value="2"/>\n    <application'
              )

          with open('android/app/src/main/AndroidManifest.xml', 'w') as f:
              f.write(content)

          print("V2 embedding enabled!")
          EOF

      - name: Create assets directory
        run: mkdir -p assets/images

      # ✅ AUTO FIX logo.png if missing
      - name: Ensure logo.png exists
        run: |
          if [ ! -f assets/images/logo.png ]; then
            echo "logo.png not found, creating default icon..."
            sudo apt-get update
            sudo apt-get install -y imagemagick
            convert -size 512x512 xc:blue \
              -gravity center \
              -pointsize 72 \
              -fill white \
              -annotate 0 "FlowMind" \
              assets/images/logo.png
          fi

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Set App Icon
        run: |
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          convert assets/images/logo.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert assets/images/logo.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert assets/images/logo.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert assets/images/logo.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert assets/images/logo.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Install Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Analyze Code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build Release APK
        run: |
          flutter build apk --release --no-tree-shake-icons \
            --dart-define=SUPABASE_URL=https://siujmsbmvwxxbdhlihgd.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpdWptc2Jtdnd4eGJkaGxpaGdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NDQ2MDksImV4cCI6MjA4OTEyMDYwOX0.WlRm9ySc6huXd7018ESMTtkKS4XLmgBszNO0yvoG2DY

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlowMind-APK-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Show APK Size
        run: |
          echo "Build Successful!"
          ls -lh build/app/outputs/flutter-apk/*.apk