name: Build FlowMind APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Create Flutter project scaffold
        run: |
          flutter create --org com.flowmind --project-name flowmind temp_project
          # Copy android folder from temp project
          cp -r temp_project/android ./android
          cp -r temp_project/ios ./ios
          cp -r temp_project/web ./web
          cp temp_project/analysis_options.yaml ./analysis_options.yaml || true
          rm -rf temp_project

      - name: Create assets directory
        run: mkdir -p assets/images

      - name: Create .env file
        run: |
          echo "GROQ_API_KEY=placeholder" > .env
          echo "SUPABASE_URL=placeholder" >> .env
          echo "SUPABASE_ANON_KEY=placeholder" >> .env

      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze Code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Build Split APKs
        run: flutter build apk --split-per-abi --release --no-tree-shake-icons
        continue-on-error: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlowMind-APK-${{ github.run_number }}
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30

      - name: Show APK Size
        run: |
          echo "✅ Build Successful!"
          ls -lh build/app/outputs/flutter-apk/*.apk
          
