- name: Add Permissions and Deep Link
        run: |
          python3 - <<'EOF'
          with open('android/app/src/main/AndroidManifest.xml', 'r') as f:
              content = f.read()

          if 'INTERNET' not in content:
              content = content.replace(
                  '<application',
                  '<uses-permission android:name="android.permission.INTERNET"/>\n'
                  '<uses-permission android:name="android.permission.VIBRATE"/>\n'
                  '<uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>\n'
                  '<application'
              )

          if 'flowmind' not in content:
              content = content.replace(
                  '</activity>',
                  '''    <intent-filter>
                      <action android:name="android.intent.action.VIEW"/>
                      <category android:name="android.intent.category.DEFAULT"/>
                      <category android:name="android.intent.category.BROWSABLE"/>
                      <data android:scheme="flowmind"/>
                  </intent-filter>
              </activity>'''
              )

          with open('android/app/src/main/AndroidManifest.xml', 'w') as f:
              f.write(content)

          print("AndroidManifest.xml updated!")
          EOF

      # ✅ NEW STEP — yahi add kiya gaya hai
      - name: Enable Android V2 Embedding
        run: |
          python3 - <<'EOF'
          with open('android/app/src/main/AndroidManifest.xml', 'r') as f:
              content = f.read()

          # Add FlutterActivity metadata for V2 embedding
          if 'flutterEmbedding' not in content:
              content = content.replace(
                  '<activity',
                  '<meta-data android:name="flutterEmbedding" android:value="2"/>\n        <activity'
              )

          with open('android/app/src/main/AndroidManifest.xml', 'w') as f:
              f.write(content)

          print("V2 embedding enabled!")
          EOF
